# Composite action: run a pipeline prompt headlessly with Claude Code and surface its JSON output.
# Default engine `claude-code-cli` is implemented and works with ANTHROPIC_API_KEY (no subscription
# rate limits — parallel sub-agents are fine). The other engines are still skeletons.
#
# NOTE: inputs/outputs MUST be block-style. The action-manifest YAML parser rejects `${{ }}` inside
# flow mappings `{ ... }` (the `}}` collides with the flow-map close brace).

name: run-claude
description: Run a feature-pipeline prompt headlessly (Claude Code CLI / action / Agent SDK)
inputs:
  prompt:
    description: Path to the prompt .md
    required: true
  config:
    description: Merged pipeline config (JSON)
    required: true
  extra:
    description: Extra key=val inputs appended to the prompt context
    required: false
    default: ''
  allowed_tools:
    description: Claude Code --allowedTools value
    required: false
    default: Edit,Write,Read,Bash,Glob,Grep,Task
  expect:
    description: Space-separated path(s) whose new/changed content proves this stage did work; the step fails if none changed.
    required: false
    default: docs/hld docs/fsd docs/specs
outputs:
  json:
    description: The prompt's JSON output contract (parsed from the model's final message)
    value: ${{ steps.run.outputs.json }}
  batches:
    description: 'Convenience: .batches from the JSON (stage 1)'
    value: ${{ steps.run.outputs.batches }}
  spec_plan:
    description: 'Convenience: .spec_plan from the JSON (stage 1)'
    value: ${{ steps.run.outputs.spec_plan }}
runs:
  using: composite
  steps:
    - name: Install Claude Code
      shell: bash
      run: npm install -g @anthropic-ai/claude-code
    - id: run
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
      run: |
        set -uo pipefail
        ENGINE="$(echo '${{ inputs.config }}' | jq -r '.runner.engine // "claude-code-cli"')"
        MODEL="$(echo  '${{ inputs.config }}' | jq -r '.runner.model  // ""')"

        echo "::group::run-claude setup"
        echo "engine=$ENGINE  model=${MODEL:-<default>}  workspace=$GITHUB_WORKSPACE"
        echo "ANTHROPIC_API_KEY present: $([ -n "${ANTHROPIC_API_KEY:-}" ] && echo yes || echo NO)"
        echo "CLAUDE_CODE_OAUTH_TOKEN present: $([ -n "${CLAUDE_CODE_OAUTH_TOKEN:-}" ] && echo yes || echo NO)"
        # Prefer subscription auth when an OAuth token is provided. With BOTH set, the CLI selects
        # ANTHROPIC_API_KEY (apiKeySource), so a depleted API account fails even though a valid token
        # exists. Drop the API key so the token wins — set only one to switch billing back.
        if [ -n "${CLAUDE_CODE_OAUTH_TOKEN:-}" ] && [ -n "${ANTHROPIC_API_KEY:-}" ]; then
          echo "auth: CLAUDE_CODE_OAUTH_TOKEN present -> ignoring ANTHROPIC_API_KEY (subscription billing)"
          unset ANTHROPIC_API_KEY
        fi
        claude --version || true
        # Trust the workspace, else Claude Code ignores permissions and runs NO tools (writes nothing).
        node -e 'const fs=require("fs"),os=require("os");const p=os.homedir()+"/.claude.json";let j={};try{j=JSON.parse(fs.readFileSync(p,"utf8"))}catch(e){};const w=process.env.GITHUB_WORKSPACE;j.projects=j.projects||{};j.projects[w]=Object.assign(j.projects[w]||{},{hasTrustDialogAccepted:true});fs.writeFileSync(p,JSON.stringify(j,null,2));console.log("trusted workspace:",w);'
        echo "::endgroup::"

        # Assemble the full prompt = the stage prompt + the merged config + any extra context.
        {
          cat '${{ inputs.prompt }}'
          printf '\n\n---\nCONTEXT (JSON config + inputs):\n'
          printf 'config=%s\n' '${{ inputs.config }}'
          printf '%s\n' '${{ inputs.extra }}'
        } > /tmp/prompt.txt

        PAYLOAD='{}'
        case "$ENGINE" in
          claude-code-cli)
            # Headless: skip permission prompts (workspace trusted above); high turn cap for multi-stage work.
            # `|| rc=$?` is required: under the composite step's default `bash -e`, a non-zero
            # claude would abort here BEFORE the debug group below runs, hiding out.json/err.log
            # and making every claude failure undebuggable. Capture the code, always dump, then fail.
            rc=0
            claude -p "$(cat /tmp/prompt.txt)" \
              ${MODEL:+--model "$MODEL"} \
              --output-format json --verbose --max-turns 300 \
              --dangerously-skip-permissions \
              > /tmp/out.json 2>/tmp/err.log || rc=$?
            echo "::group::claude output (exit=$rc)"; tail -c 8000 /tmp/out.json 2>/dev/null; echo; echo "--- stderr (full) ---"; cat /tmp/err.log 2>/dev/null; echo "::endgroup::"
            if [ "$rc" -ne 0 ]; then echo "::error::claude exited $rc — see the 'claude output' group above (stderr / out.json)"; exit "$rc"; fi
            # `--output-format json --verbose` writes a JSON ARRAY of stream events (the final
            # element is the result object), so `.result` on the top level is a jq runtime error
            # (exit 5) that aborts the whole step under `set -e`. Pull `.result` from the last
            # result event; tolerate the plain-object shape; never abort on a parse hiccup (fall
            # through to the "produced no output" guard below for a clear message instead).
            RESULT="$(jq -r 'if type=="array" then ([.[] | select(.type? == "result")] | last | .result) else .result end // ""' /tmp/out.json 2>/dev/null || echo "")"
            PAYLOAD="$(printf '%s' "$RESULT" | grep -ozP '(?s)\{.*\}' | tr -d '\0' 2>/dev/null || echo '{}')"
            ;;
          claude-code-action)
            echo "TODO: delegate to anthropics/claude-code-action and read its result file"; PAYLOAD='{}' ;;
          claude-agent-sdk)
            echo "TODO: node/python step invoking the Agent SDK"; PAYLOAD='{}' ;;
          *) echo "unknown engine: $ENGINE"; exit 1 ;;
        esac

        echo "$PAYLOAD" | jq . >/dev/null 2>&1 || PAYLOAD='{}'
        {
          echo "json<<EOF"; echo "$PAYLOAD"; echo "EOF"
          echo "batches=$(echo "$PAYLOAD"   | jq -c '.batches   // empty')"
          echo "spec_plan=$(echo "$PAYLOAD" | jq -c '.spec_plan // empty')"
        } >> "$GITHUB_OUTPUT"

        # Fail loud if this stage produced nothing under its expected path (no-op stops passing as success).
        echo "::group::workspace changes after run"
        git -C "$GITHUB_WORKSPACE" status --porcelain -- ${{ inputs.expect }} 2>/dev/null | head -80
        N="$(git -C "$GITHUB_WORKSPACE" status --porcelain -- ${{ inputs.expect }} 2>/dev/null | wc -l | tr -d ' ')"
        echo "changes under [${{ inputs.expect }}]: $N"
        echo "::endgroup::"
        if [ "$N" = "0" ]; then echo "::error::Claude produced no output under [${{ inputs.expect }}] — see the claude log above (trust / tools / prompt)."; exit 1; fi
