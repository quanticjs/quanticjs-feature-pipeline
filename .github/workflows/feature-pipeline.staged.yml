# feature-pipeline — STAGED workflow (on: workflow_call). 4 sequential stages, RESUMABLE:
#   1) BRD -> HLD     2) HLD -> FSD     3) FSD -> Specs     4) Spec Review
# Each stage reads the previous stage's output from a persistent WORK BRANCH (inputs.work_branch)
# and commits its own output back to it. Any stage can therefore be re-run independently via
# `start_stage` WITHOUT rerunning earlier stages — the prior output is read from the branch, not
# from same-run artifacts. `start_stage` is the ENTRY point: that stage and everything after it run.
# One PR (head = the work branch) collects docs/hld + docs/fsd + docs/specs and auto-updates as
# stages push to the branch.

on:
  workflow_call:
    inputs:
      config:
        type: string
        default: docs/pipeline.config.yml
      pipeline_ref:
        type: string
        default: v1
      start_stage:
        description: 'Entry stage: brd-to-hld | hld-to-fsd | fsd-to-spec | spec-review. Earlier stages are skipped; their output is read from the work branch.'
        type: string
        default: brd-to-hld
      work_branch:
        description: 'Persistent branch that carries docs between stages and is the PR head.'
        type: string
        default: pipeline/brd-run
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      FRAMEWORK_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: write

# Serialize runs that target the same work branch so concurrent stages can't clobber it.
concurrency:
  group: feature-pipeline-${{ inputs.work_branch }}
  cancel-in-progress: false

env:
  PIPELINE_REPO: quanticjs/quanticjs-feature-pipeline

jobs:
  # ── merge config (package defaults <- consumer overrides) once; validate start_stage ──
  config:
    runs-on: ubuntu-latest
    outputs:
      cfg: ${{ steps.m.outputs.cfg }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PIPELINE_REPO }}
          ref: ${{ inputs.pipeline_ref }}
          path: .pipeline
      - name: Validate start_stage
        run: |
          set -euo pipefail
          case "${{ inputs.start_stage }}" in
            brd-to-hld|hld-to-fsd|fsd-to-spec|spec-review) echo "start_stage=${{ inputs.start_stage }}" ;;
            *) echo "::error::invalid start_stage '${{ inputs.start_stage }}' (expected brd-to-hld | hld-to-fsd | fsd-to-spec | spec-review)"; exit 1 ;;
          esac
      - id: m
        run: |
          set -euo pipefail
          if [ -f "${{ inputs.config }}" ]; then
            yq -o=json eval-all '. as $i ireduce ({}; . * $i)' .pipeline/config/pipeline.defaults.yml "${{ inputs.config }}" > /tmp/cfg.json
          else
            yq -o=json '.' .pipeline/config/pipeline.defaults.yml > /tmp/cfg.json
          fi
          echo "cfg=$(jq -c . /tmp/cfg.json)" >> "$GITHUB_OUTPUT"

  # ── STAGE 1 — BRD -> HLD ─────────────────────────────────────────────────────
  brd-to-hld:
    needs: config
    if: ${{ !cancelled() && needs.config.result == 'success' && inputs.start_stage == 'brd-to-hld' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check out (or create) the work branch
        run: |
          set -euo pipefail
          git fetch origin "${{ inputs.work_branch }}" || true
          if git rev-parse --verify "origin/${{ inputs.work_branch }}" >/dev/null 2>&1; then
            git checkout -B "${{ inputs.work_branch }}" "origin/${{ inputs.work_branch }}"
          else
            echo "work branch does not exist yet — creating it from the triggering ref"
            git checkout -B "${{ inputs.work_branch }}"
          fi
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PIPELINE_REPO }}
          ref: ${{ inputs.pipeline_ref }}
          path: .pipeline
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Checkout framework sources (optional stage-0 grounding)
        run: |
          set -euo pipefail
          [ "$(echo '${{ needs.config.outputs.cfg }}' | jq -r '.framework.checkout // false')" = "true" ] || { echo "framework.checkout disabled"; exit 0; }
          mkdir -p .framework
          echo '${{ needs.config.outputs.cfg }}' | jq -r '.framework.repos[]?' | while read -r e; do
            repo="${e%@*}"; ref="${e##*@}"; name="${repo##*/}"
            git clone --depth=1 --branch "$ref" "https://x-access-token:${{ secrets.FRAMEWORK_TOKEN }}@github.com/${repo}.git" ".framework/${name}" \
              || echo "::warning::could not clone ${repo} (HLD grounding falls back to .claude/rules)"
          done
      - uses: quanticjs/quanticjs-feature-pipeline/.github/actions/run-claude@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          prompt: .pipeline/prompts/00-brd-to-hld.md
          config: ${{ needs.config.outputs.cfg }}
          extra: framework_dir=.framework
          expect: docs/hld
      - name: Commit HLD to the work branch
        run: |
          set -euo pipefail
          git add docs/hld
          if git diff --cached --quiet; then echo "no HLD changes to commit"; exit 0; fi
          git -c user.name='feature-pipeline[bot]' -c user.email='feature-pipeline@users.noreply.github.com' \
            commit -m 'pipeline(brd-to-hld): generate docs/hld'
          git push origin "HEAD:${{ inputs.work_branch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: hld
          path: docs/hld
          if-no-files-found: warn

  # ── STAGE 2 — HLD -> FSD (index + author) ────────────────────────────────────
  hld-to-fsd:
    needs: [config, brd-to-hld]
    if: ${{ !cancelled() && needs.config.result == 'success' && (needs.brd-to-hld.result == 'success' || needs.brd-to-hld.result == 'skipped') && (inputs.start_stage == 'brd-to-hld' || inputs.start_stage == 'hld-to-fsd') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check out the work branch (must exist; carries docs/hld)
        run: |
          set -euo pipefail
          git fetch origin "${{ inputs.work_branch }}" || true
          if ! git rev-parse --verify "origin/${{ inputs.work_branch }}" >/dev/null 2>&1; then
            echo "::error::work branch '${{ inputs.work_branch }}' not found — run the brd-to-hld stage first."; exit 1
          fi
          git checkout -B "${{ inputs.work_branch }}" "origin/${{ inputs.work_branch }}"
          [ -d docs/hld ] && [ -n "$(ls -A docs/hld 2>/dev/null)" ] || { echo "::error::docs/hld missing on '${{ inputs.work_branch }}' — run brd-to-hld first."; exit 1; }
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PIPELINE_REPO }}
          ref: ${{ inputs.pipeline_ref }}
          path: .pipeline
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: quanticjs/quanticjs-feature-pipeline/.github/actions/run-claude@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          prompt: .pipeline/prompts/stage-2-hld-to-fsd.md
          config: ${{ needs.config.outputs.cfg }}
          expect: docs/fsd
      - name: Commit FSD (+ tracker) to the work branch
        run: |
          set -euo pipefail
          git add docs/fsd docs/specs 2>/dev/null || true
          if git diff --cached --quiet; then echo "no FSD changes to commit"; exit 0; fi
          git -c user.name='feature-pipeline[bot]' -c user.email='feature-pipeline@users.noreply.github.com' \
            commit -m 'pipeline(hld-to-fsd): generate docs/fsd (+ tracker)'
          git push origin "HEAD:${{ inputs.work_branch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: fsd
          path: docs/fsd
          if-no-files-found: warn

  # ── STAGE 3 — FSD -> Specs ───────────────────────────────────────────────────
  fsd-to-spec:
    needs: [config, hld-to-fsd]
    if: ${{ !cancelled() && needs.config.result == 'success' && (needs.hld-to-fsd.result == 'success' || needs.hld-to-fsd.result == 'skipped') && inputs.start_stage != 'spec-review' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check out the work branch (must exist; carries docs/fsd)
        run: |
          set -euo pipefail
          git fetch origin "${{ inputs.work_branch }}" || true
          if ! git rev-parse --verify "origin/${{ inputs.work_branch }}" >/dev/null 2>&1; then
            echo "::error::work branch '${{ inputs.work_branch }}' not found — run earlier stages first."; exit 1
          fi
          git checkout -B "${{ inputs.work_branch }}" "origin/${{ inputs.work_branch }}"
          [ -d docs/fsd ] && [ -n "$(ls -A docs/fsd 2>/dev/null)" ] || { echo "::error::docs/fsd missing on '${{ inputs.work_branch }}' — run hld-to-fsd first."; exit 1; }
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PIPELINE_REPO }}
          ref: ${{ inputs.pipeline_ref }}
          path: .pipeline
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: quanticjs/quanticjs-feature-pipeline/.github/actions/run-claude@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          prompt: .pipeline/prompts/stage-3-fsd-to-spec.md
          config: ${{ needs.config.outputs.cfg }}
          expect: docs/specs
      - name: Assert specs produced
        run: |
          set -euo pipefail
          n="$(ls docs/specs/SPEC-*.md 2>/dev/null | wc -l | tr -d ' ')"
          echo "SPEC files produced: $n"
          [ "$n" -gt 0 ] || { echo "::error::stage 3 produced no SPEC-*.md"; exit 1; }
      - name: Commit specs to the work branch
        run: |
          set -euo pipefail
          git add docs/specs
          if git diff --cached --quiet; then echo "no spec changes to commit"; exit 0; fi
          git -c user.name='feature-pipeline[bot]' -c user.email='feature-pipeline@users.noreply.github.com' \
            commit -m 'pipeline(fsd-to-spec): generate docs/specs (numbered specs + TRACKER.md)'
          git push origin "HEAD:${{ inputs.work_branch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: specs
          path: docs/specs
          if-no-files-found: warn

  # ── STAGE 4 — Spec Review (review every spec vs .claude/rules, correct in place) ──
  spec-review:
    needs: [config, fsd-to-spec]
    if: ${{ !cancelled() && needs.config.result == 'success' && (needs.fsd-to-spec.result == 'success' || needs.fsd-to-spec.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check out the work branch (must exist; carries docs/specs)
        run: |
          set -euo pipefail
          git fetch origin "${{ inputs.work_branch }}" || true
          if ! git rev-parse --verify "origin/${{ inputs.work_branch }}" >/dev/null 2>&1; then
            echo "::error::work branch '${{ inputs.work_branch }}' not found — run earlier stages first."; exit 1
          fi
          git checkout -B "${{ inputs.work_branch }}" "origin/${{ inputs.work_branch }}"
          ls docs/specs/SPEC-*.md >/dev/null 2>&1 || { echo "::error::no docs/specs/SPEC-*.md on '${{ inputs.work_branch }}' — run fsd-to-spec first."; exit 1; }
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PIPELINE_REPO }}
          ref: ${{ inputs.pipeline_ref }}
          path: .pipeline
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: quanticjs/quanticjs-feature-pipeline/.github/actions/run-claude@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          prompt: .pipeline/prompts/stage-4-spec-review.md
          config: ${{ needs.config.outputs.cfg }}
          expect: docs/specs
      - name: Commit reviewed specs (+ REVIEW.md) to the work branch
        run: |
          set -euo pipefail
          git add docs/specs
          if git diff --cached --quiet; then echo "no spec-review changes to commit"; exit 0; fi
          git -c user.name='feature-pipeline[bot]' -c user.email='feature-pipeline@users.noreply.github.com' \
            commit -m 'pipeline(spec-review): review specs vs .claude/rules, apply corrections (+ REVIEW.md)'
          git push origin "HEAD:${{ inputs.work_branch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: specs-reviewed
          path: docs/specs
          if-no-files-found: warn

  # ── open ONE PR (head = work branch) with HLD + FSD + reviewed Specs ──────────
  open-pr:
    needs: [config, brd-to-hld, hld-to-fsd, fsd-to-spec, spec-review]
    if: ${{ !cancelled() && needs.spec-review.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.work_branch }}
          fetch-depth: 0
      - name: Open or update the PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          base="${{ github.event.repository.default_branch }}"
          if gh pr view "${{ inputs.work_branch }}" --json number >/dev/null 2>&1; then
            echo "PR for '${{ inputs.work_branch }}' already open — the new commits update it automatically."
          else
            gh pr create --head "${{ inputs.work_branch }}" --base "$base" \
              --title 'pipeline: HLD + FSD + specs from BRD' \
              --body $'Generated by the staged feature-pipeline (BRD → HLD → FSD → specs).\n\nReview `docs/hld`, `docs/fsd`, and `docs/specs` (numbered specs + TRACKER.md), then implement in tracker order with /implement-spec.\n\nEach stage is resumable: re-run a single stage with the `start_stage` input — it reads prior output from this branch.'
          fi
