# Example CONSUMER override — EDB Trade Finance (the pipeline's first real consumer).
# Only the keys that differ from config/pipeline.defaults.yml. Everything else inherits the defaults.
# This file would live at docs/pipeline.config.yml in the consumer repo.

runner:
  model: claude-opus-4-8        # pin a model for reproducibility

# Trade Finance uses the decomposition defaults as-is (module-subprocess-hybrid, spec-aligned,
# generate-all, banded, 6 authors). See ./reference-run.md for the decomposition + author assignments.

# Stage 0 grounding — in CI, clone the framework repos (needs FRAMEWORK_TOKEN); locally, set
# framework.local_paths to the repos on disk. require: true hard-fails rather than guess symbols.
framework:
  require: true
  checkout: true
  # local_paths:                         # for local driver runs, point at your clones:
  #   - /abs/path/to/quanticjs-backend
  #   - /abs/path/to/quanticjs-ui
  #   - /abs/path/to/quanticflow
  #   - /abs/path/to/notification-engine
  #   - /abs/path/to/file-service

# domain/verify/spec.size_budget default ON in pipeline.defaults.yml — listed here for visibility.
domain: { enabled: true, never_invent: true }
verify: { enabled: true, fail_on_blocker: true }

gates:
  mode: pr-per-stage
  # reviewers: [edb-trade-architects]   # example: require an architecture team approval per stage
